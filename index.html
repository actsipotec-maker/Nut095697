<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home IoT Panel</title>
    
    <!-- นำเข้า FontAwesome สำหรับใช้ไอคอนต่างๆ (หลอดไฟ, ปลั๊ก, ทีวี, แอร์) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- CSS สำหรับตกแต่ง UI --- */
        body {
            background-color: #0f1015; /* สีพื้นหลังโทนเข้ม */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .control-panel {
            background-color: #1a1b26;
            border-radius: 20px;
            padding: 40px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2b36;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .neon-title {
            color: #00ffff;
            text-transform: uppercase;
            font-size: 24px;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5), 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .subtitle {
            color: #8a8b96;
            font-size: 14px;
            margin: 0;
        }

        .channel-row {
            background-color: #232431;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 16px;
        }

        .channel-info i {
            color: #00ffff;
            width: 20px;
            text-align: center;
        }

        /* --- CSS สำหรับ Toggle Switch --- */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #00ffff;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="header">
            <h1 class="neon-title">Smart Home</h1>
            <p class="subtitle">ESP8266 IoT Control Panel</p>
        </div>

        <!-- ช่องที่ 1 (D1) -->
        <div class="channel-row">
            <div class="channel-info">
                <i class="fa-solid fa-lightbulb"></i>
                <span>ช่องที่ 1 (D1)</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="ch1">
                <span class="slider"></span>
            </label>
        </div>

        <!-- ช่องที่ 2 (D2) -->
        <div class="channel-row">
            <div class="channel-info">
                <i class="fa-solid fa-plug"></i>
                <span>ช่องที่ 2 (D2)</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="ch2">
                <span class="slider"></span>
            </label>
        </div>

        <!-- ช่องที่ 3 (D5) -->
        <div class="channel-row">
            <div class="channel-info">
                <i class="fa-solid fa-tv"></i>
                <span>ช่องที่ 3 (D5)</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="ch3">
                <span class="slider"></span>
            </label>
        </div>

        <!-- ช่องที่ 4 (D6) -->
        <div class="channel-row">
            <div class="channel-info">
                <i class="fa-solid fa-snowflake"></i>
                <span>ช่องที่ 4 (D6)</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="ch4">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <!-- --- JavaScript สำหรับเชื่อมต่อ Firebase --- -->
    <!-- ใช้ Firebase เวอร์ชัน Modular (v10) ผ่าน CDN -->
    <script type="module">
        // 1. นำเข้าฟังก์ชันที่จำเป็นจาก Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // 2. ⚠️ ใส่ Firebase Configuration ของคุณที่นี่ ⚠️
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // 3. เริ่มต้นการทำงานของ Firebase และ Database
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 4. สร้างฟังก์ชันเชื่อมโยง UI สวิตช์ กับ Firebase
        function setupChannel(switchId, dbPath) {
            const toggleSwitch = document.getElementById(switchId);
            const dbRef = ref(db, dbPath);

            // เมื่อมีการกดสวิตช์บนเว็บ -> ส่งค่าไปอัปเดตที่ Firebase
            toggleSwitch.addEventListener('change', (event) => {
                set(dbRef, event.target.checked)
                    .then(() => console.log(`${switchId} ถูกปรับเป็น ${event.target.checked}`))
                    .catch((error) => console.error("เกิดข้อผิดพลาด:", error));
            });

            // เมื่อค่าใน Firebase เปลี่ยนแปลง -> ให้อัปเดตสวิตช์บนเว็บแบบเรียลไทม์
            onValue(dbRef, (snapshot) => {
                const data = snapshot.val();
                if (data !== null) {
                    toggleSwitch.checked = data;
                }
            });
        }

        // 5. เรียกใช้ฟังก์ชันสำหรับทั้ง 4 ช่อง (โดยตั้งชื่อ path ในฐานข้อมูลว่า relays/ch1, relays/ch2, ...)
        setupChannel('ch1', 'relays/ch1');
        setupChannel('ch2', 'relays/ch2');
        setupChannel('ch3', 'relays/ch3');
        setupChannel('ch4', 'relays/ch4');
    </script>
</body>
</html>
